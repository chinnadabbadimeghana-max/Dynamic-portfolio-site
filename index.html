<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- custom css -->
    <link rel="stylesheet" href="styles.css" />
    <title>Meghana portfolio</title>
  </head>
  <body>
    <!-- Sections are loaded dynamically at runtime by loader.js -->
    <div id="navbar-section"></div>
    <div id="header-section"></div>
    <div id="about-section"></div>
    <div id="skills-section"></div>
    <div id="works-section"></div>
    <div id="contact-section"></div>
    <div id="footer-section"></div>

    <!-- loader.js fetches sections above, then loads script.js once they're in the DOM -->
    <script src="loader.js"></script>
  </body>
</html>
